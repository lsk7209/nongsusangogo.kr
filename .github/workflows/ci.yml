name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run lint
      - run: npm run phase1:smoke
      - run: npm run phase2:smoke
      - run: npm run phase3:smoke
      - run: npm run probe:gate05
      - run: npm run build
      - run: npm run typecheck
